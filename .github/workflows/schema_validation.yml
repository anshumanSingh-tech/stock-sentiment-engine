name: Schema Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  schema-check:
    name: DuckDB Schema Initialisation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install duckdb==1.5.3 pandas python-dotenv loguru

      - name: Initialise database schema
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')

          os.environ['DUCKDB_PATH'] = ':memory:'

          from config.database import init_database, get_connection
          init_database()
          print('Schema initialised successfully')
          "

      - name: Verify all tables exist with correct columns
        run: |
          python -c "
