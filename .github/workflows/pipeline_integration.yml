name: Pipeline Integration Test

on:
  push:
    branches: [main]

jobs:
  integration-test:
    name: End-to-End Pipeline Components
    runs-on: ubuntu-latest

    env:
      DUCKDB_PATH: ":memory:"
      LOG_LEVEL: WARNING

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install pipeline dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test market collector pct_change fix
        run: |
          python -c "
          import sys, pandas as pd
          from datetime import date
          sys.path.insert(0, '.')

          from collectors.market_collector import process_ticker_df

          df_single = pd.DataFrame([{
              'date': pd.Timestamp('2026-06-29'),
              'open': 1308.0, 'high': 1313.7,
              'low': 1292.6, 'close': 1301.0,
              'volume': 13757656,
          }])
          result = process_ticker_df(df_single, 'RELIANCE')
          print(f'Single row result: {len(result)} rows (expected 0 - NaN dropped)')

          df_two = pd.DataFrame([
              {'date': pd.Timestamp('2026-06-25'), 'open': 1290.0,
               'high': 1300.0, 'low': 1285.0, 'close': 1295.0, 'volume': 10000000},
              {'date': pd.Timestamp('2026-06-29'), 'open': 1308.0,
               'high': 1313.7, 'low': 1292.6, 'close': 1301.0, 'volume': 13757656},
          ])
          result = process_ticker_df(df_two, 'RELIANCE')
          assert len(result) == 1, f'Expected 1 row, got {len(result)}'
          assert abs(result['pct_change'].iloc[0] - 0.4633) < 0.01, \
              f'pct_change wrong: {result[\"pct_change\"].iloc[0]}'
          print(f'Two-row result: {len(result)} rows, pct_change={result[\"pct_change\"].iloc[0]:.4f}')
          print('Market collector pct_change fix verified')
          "

      - name: Test FinBERT scorer
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          os.environ['DUCKDB_PATH'] = ':memory:'

          from config.database import init_database
          from nlp.finbert_scorer import load_finbert, score_texts

          init_database()

          load_finbert()

          test_texts = [
              'Reliance Industries reports record quarterly profit beating analyst estimates',
              'HDFC Bank shares fall sharply after RBI imposes restrictions',
              'TCS announces 10000 new hires in the coming fiscal year',
              'Sensex drops 500 points amid global market sell-off',
              'Infosys maintains full-year guidance after Q2 results',
          ]
          expected_sentiment = [
              'positive',
              'negative',
              'positive',
              'negative',
              'neutral',
          ]

          scores = score_texts(test_texts)

          assert len(scores) == 5, f'Expected 5 scores, got {len(scores)}'

          for i, (score, expected) in enumerate(zip(scores, expected_sentiment)):
              assert -1 <= score['compound_score'] <= 1, \
                  f'compound_score out of range: {score[\"compound_score\"]}'

              prob_sum = score['score_positive'] + score['score_negative'] + score['score_neutral']
              assert abs(prob_sum - 1.0) < 0.01, \
                  f'Probabilities do not sum to 1: {prob_sum}'

              if score['score_positive'] > score['score_negative'] and \
                 score['score_positive'] > score['score_neutral']:
                  predicted = 'positive'
              elif score['score_negative'] > score['score_positive'] and \
                   score['score_negative'] > score['score_neutral']:
                  predicted = 'negative'
              else:
                  predicted = 'neutral'

              match = 'OK' if predicted == expected else 'MISMATCH'
              print(
                  f'{match} [{expected:8s}|{predicted:8s}] '
                  f'compound={score[\"compound_score\"]:+.3f} | '
                  f'{test_texts[i][:50]}'
              )

          print('FinBERT scorer test passed')
          "

      - name: Test validation gate logic
        run: |
          python -c "
          import sys, os, pandas as pd
          from datetime import date
          sys.path.insert(0, '.')
          os.environ['DUCKDB_PATH'] = ':memory:'

          from config.database import init_database, insert_df
          from validation.validator import run_collection_checks

          init_database()

          try:
              run_collection_checks('2026-07-01')
              print('ERROR: Should have raised ValueError with no data')
              exit(1)
          except ValueError as e:
              if 'price_row_count' in str(e):
                  print('Correctly failed with no price data')
              else:
                  raise

          import sys
          sys.path.insert(0, '.')
          from config.config import TICKERS
          price_rows = []
          for ticker in TICKERS[:22]:
              price_rows.append({
                  'ticker': ticker,
                  'trade_date': date(2026, 7, 1),
                  'open_price': 100.0,
                  'high_price': 105.0,
                  'low_price': 98.0,
                  'close_price': 102.0,
                  'adj_close': 102.0,
                  'volume': 1000000,
                  'pct_change': 1.5,
                  'intraday_range': 2.0,
              })
          insert_df('price_daily', pd.DataFrame(price_rows), mode='ignore')

          sentiment_rows = []
          for i in range(15):
              sentiment_rows.append({
                  'ticker': TICKERS[i % len(TICKERS)],
                  'source': 'google_news',
                  'source_id': f'test_{i}',
                  'title': f'Test headline {i}',
                  'raw_text': f'Test article text {i} about the company',
                  'url': f'https://example.com/{i}',
                  'published_date': date(2026, 7, 1),
                  'collected_date': date(2026, 7, 1),
              })
          insert_df('raw_sentiment', pd.DataFrame(sentiment_rows), mode='ignore')

          report = run_collection_checks('2026-07-01')
          assert report.pipeline_ok, \
              f'Validation should pass with sufficient data: {report}'
          print(f'Validation status: {report.pipeline_ok}')
          print('Validation gate test passed')
          "

      - name: Test holiday-aware pipeline skip
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          os.environ['DUCKDB_PATH'] = ':memory:'

          from config.config import is_market_holiday

          holidays_to_check = [
              ('2026-09-14', True,  'Ganesh Chaturthi'),
              ('2026-11-24', True,  'Diwali'),
              ('2026-12-25', True,  'Christmas'),
              ('2026-07-13', False, 'Normal Monday'),
              ('2026-07-14', False, 'Normal Tuesday'),
          ]

          for date_str, expected_holiday, label in holidays_to_check:
              result = is_market_holiday(date_str)
              assert result == expected_holiday, \
                  f'{label} ({date_str}): expected holiday={expected_holiday}, got {result}'
              status = 'HOLIDAY' if result else 'TRADING'
              print(f'  {status}: {date_str} ({label})')

          print('Holiday-aware pipeline skip test passed')
          "

      - name: Print test summary
        run: |
          echo "============================================"
          echo "All integration tests passed successfully"
          echo "  1. Market collector pct_change fix"
          echo "  2. FinBERT scorer output format"
          echo "  3. Validation gate logic"
          echo "  4. Holiday-aware pipeline skip"
          echo "============================================"